<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 660" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#333" stroke-width="1" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
    <marker id="arr-dash" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#888" stroke-width="1" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
  </defs>

  <rect width="820" height="660" fill="#fff"/>

  <!-- ══════════ GROUND CONTROL ══════════ -->
  <text x="32" y="32" fill="#333" font-size="13" font-weight="600">Ground control</text>

  <rect x="32" y="50" width="220" height="60" rx="8" fill="#F3EEFE" stroke="#8B72BE" stroke-width="1"/>
  <text x="142" y="74" text-anchor="middle" fill="#4E3D80" font-size="13" font-weight="600">Mission Planner (ArduPilot)</text>
  <text x="142" y="94" text-anchor="middle" fill="#7A6BA0" font-size="10">Waypoint upload · telemetry view</text>

  <rect x="272" y="50" width="220" height="60" rx="8" fill="#F3EEFE" stroke="#8B72BE" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="382" y="74" text-anchor="middle" fill="#4E3D80" font-size="13" font-weight="600">TBS Tango 2 Pro</text>
  <text x="382" y="94" text-anchor="middle" fill="#7A6BA0" font-size="10">Crossfire 915 MHz · 4 km range</text>

  <rect x="512" y="50" width="220" height="60" rx="8" fill="#F3EEFE" stroke="#8B72BE" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="622" y="74" text-anchor="middle" fill="#4E3D80" font-size="13" font-weight="600">Holybro SiK Telemetry</text>
  <text x="622" y="94" text-anchor="middle" fill="#7A6BA0" font-size="10">MAVLink 433 MHz · 500 mW</text>

  <!-- arrows down -->
  <line x1="142" y1="110" x2="142" y2="200" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="106" y="142" width="72" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="142" y="156" text-anchor="middle" fill="#666" font-size="10">mission plan</text>

  <line x1="382" y1="110" x2="382" y2="200" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>
  <rect x="346" y="142" width="72" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="382" y="156" text-anchor="middle" fill="#666" font-size="10">manual ovr</text>

  <line x1="622" y1="110" x2="622" y2="200" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>
  <rect x="586" y="142" width="72" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="622" y="156" text-anchor="middle" fill="#666" font-size="10">MAVLink</text>

  <!-- ══════════ FLIGHT CONTROLLER ══════════ -->
  <text x="32" y="186" fill="#333" font-size="13" font-weight="600">Flight controller</text>

  <rect x="24" y="196" width="772" height="118" rx="10" fill="none" stroke="#bbb" stroke-width="0.8" stroke-dasharray="6,3"/>

  <rect x="40" y="216" width="200" height="80" rx="8" fill="#FFF0E8" stroke="#D85A30" stroke-width="1"/>
  <text x="140" y="244" text-anchor="middle" fill="#712B13" font-size="13" font-weight="600">Pixhawk Cube Orange</text>
  <text x="140" y="262" text-anchor="middle" fill="#A86040" font-size="10">3× redundant IMUs · EKF</text>
  <text x="140" y="278" text-anchor="middle" fill="#A86040" font-size="10">temperature stabilised</text>

  <rect x="280" y="216" width="200" height="80" rx="8" fill="#EBF5FF" stroke="#4A90D9" stroke-width="1"/>
  <text x="380" y="244" text-anchor="middle" fill="#1A5694" font-size="13" font-weight="600">Here3 GPS / INS</text>
  <text x="380" y="262" text-anchor="middle" fill="#4A78A5" font-size="10">RTK · gyro · accel · mag</text>
  <text x="380" y="278" text-anchor="middle" fill="#4A78A5" font-size="10">CAN bus</text>

  <rect x="520" y="216" width="240" height="80" rx="8" fill="#E6F7F0" stroke="#1D9E75" stroke-width="1"/>
  <text x="640" y="244" text-anchor="middle" fill="#085041" font-size="13" font-weight="600">Power Distribution</text>
  <text x="640" y="262" text-anchor="middle" fill="#3A8A6E" font-size="10">2× 1300 mAh 6S LiPo (parallel)</text>
  <text x="640" y="278" text-anchor="middle" fill="#3A8A6E" font-size="10">25.2 V · 2600 mAh · 100C</text>

  <!-- internal links -->
  <line x1="280" y1="256" x2="240" y2="256" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="244" y="236" width="32" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="260" y="250" text-anchor="middle" fill="#666" font-size="10">pos</text>

  <line x1="520" y1="256" x2="480" y2="256" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="484" y="236" width="32" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="500" y="250" text-anchor="middle" fill="#666" font-size="10">5 V</text>

  <!-- ══════════ ACTUATORS ══════════ -->
  <text x="32" y="346" fill="#333" font-size="13" font-weight="600">Propulsion &amp; payload</text>

  <rect x="40" y="364" width="220" height="74" rx="8" fill="#F5F5F2" stroke="#888" stroke-width="1"/>
  <text x="150" y="388" text-anchor="middle" fill="#333" font-size="13" font-weight="600">2× 4-in-1 ESC</text>
  <text x="150" y="406" text-anchor="middle" fill="#777" font-size="10">50 A · 3S–6S · DShot</text>
  <text x="150" y="422" text-anchor="middle" fill="#777" font-size="10">1000 µF spike filter</text>

  <rect x="300" y="364" width="220" height="74" rx="8" fill="#F5F5F2" stroke="#888" stroke-width="1"/>
  <text x="410" y="388" text-anchor="middle" fill="#333" font-size="13" font-weight="600">6× Emax ECO II 2306</text>
  <text x="410" y="406" text-anchor="middle" fill="#777" font-size="10">1700 KV BLDC</text>
  <text x="410" y="422" text-anchor="middle" fill="#777" font-size="10">5" tri-blade props</text>

  <rect x="560" y="364" width="220" height="74" rx="8" fill="#F5F5F2" stroke="#888" stroke-width="1"/>
  <text x="670" y="388" text-anchor="middle" fill="#333" font-size="13" font-weight="600">Payload bay servo</text>
  <text x="670" y="406" text-anchor="middle" fill="#777" font-size="10">Double-door · single rod</text>
  <text x="670" y="422" text-anchor="middle" fill="#777" font-size="10">900 g capacity</text>

  <!-- pixhawk → ESC (PWM) -->
  <path d="M140,296 L140,360" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="106" y="318" width="68" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="140" y="332" text-anchor="middle" fill="#666" font-size="10">PWM/DShot</text>

  <!-- ESC → Motors -->
  <line x1="260" y1="401" x2="296" y2="401" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="262" y="383" width="32" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="278" y="397" text-anchor="middle" fill="#666" font-size="10">3φ</text>

  <!-- pixhawk → servo -->
  <path d="M170,296 L170,344 L670,344 L670,360" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="404" y="334" width="68" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="438" y="348" text-anchor="middle" fill="#666" font-size="10">AUX out</text>

  <!-- battery → ESC -->
  <path d="M620,296 L620,330 L150,330 L150,360" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="356" y="320" width="72" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="392" y="334" text-anchor="middle" fill="#666" font-size="10">25.2 V bus</text>

  <!-- ══════════ MISSION SEQUENCE ══════════ -->
  <text x="32" y="478" fill="#333" font-size="13" font-weight="600">Mission sequence</text>

  <rect x="40" y="496" width="120" height="38" rx="19" fill="#F5F5F2" stroke="#888" stroke-width="1"/>
  <text x="100" y="519" text-anchor="middle" fill="#444" font-size="12">Arm + Take-off</text>

  <rect x="190" y="496" width="120" height="38" rx="19" fill="#F3EEFE" stroke="#8B72BE" stroke-width="1"/>
  <text x="250" y="519" text-anchor="middle" fill="#4E3D80" font-size="12">Waypoint nav</text>

  <rect x="340" y="496" width="120" height="38" rx="19" fill="#FFF0E8" stroke="#D85A30" stroke-width="1"/>
  <text x="400" y="519" text-anchor="middle" fill="#712B13" font-size="12">Target loiter</text>

  <rect x="490" y="496" width="120" height="38" rx="19" fill="#E6F7F0" stroke="#1D9E75" stroke-width="1"/>
  <text x="550" y="519" text-anchor="middle" fill="#085041" font-size="12">Payload drop</text>

  <rect x="640" y="496" width="140" height="38" rx="19" fill="#E6F7F0" stroke="#1D9E75" stroke-width="1"/>
  <text x="710" y="519" text-anchor="middle" fill="#085041" font-size="12">Return to home</text>

  <line x1="160" y1="515" x2="186" y2="515" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="310" y1="515" x2="336" y2="515" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="460" y1="515" x2="486" y2="515" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="610" y1="515" x2="636" y2="515" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ══════════ LEGEND ══════════ -->
  <g transform="translate(32,610)">
    <line x1="0" y1="8" x2="30" y2="8" stroke="#333" stroke-width="1"/>
    <text x="38" y="12" fill="#666" font-size="10">Wired link</text>
    <line x1="120" y1="8" x2="150" y2="8" stroke="#888" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="158" y="12" fill="#666" font-size="10">Wireless link</text>

    <rect x="250" y="1" width="14" height="14" rx="3" fill="#F3EEFE" stroke="#8B72BE" stroke-width="0.8"/>
    <text x="272" y="12" fill="#666" font-size="10">Ground / comms</text>
    <rect x="368" y="1" width="14" height="14" rx="3" fill="#FFF0E8" stroke="#D85A30" stroke-width="0.8"/>
    <text x="390" y="12" fill="#666" font-size="10">Flight control</text>
    <rect x="478" y="1" width="14" height="14" rx="3" fill="#EBF5FF" stroke="#4A90D9" stroke-width="0.8"/>
    <text x="500" y="12" fill="#666" font-size="10">Navigation</text>
    <rect x="578" y="1" width="14" height="14" rx="3" fill="#E6F7F0" stroke="#1D9E75" stroke-width="0.8"/>
    <text x="600" y="12" fill="#666" font-size="10">Power / payload</text>
    <rect x="694" y="1" width="14" height="14" rx="3" fill="#F5F5F2" stroke="#888" stroke-width="0.8"/>
    <text x="716" y="12" fill="#666" font-size="10">Actuators</text>
  </g>

  <text x="410" y="650" text-anchor="middle" fill="#333" font-size="12" font-weight="600">Fig. 1 — System architecture of the ZEUS hexacopter</text>
</svg>
