<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#333" stroke-width="1" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
    <marker id="arr-dash" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#888" stroke-width="1" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
    <marker id="arr-pwr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#1D9E75" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
  </defs>

  <rect width="820" height="600" fill="#fff"/>

  <!-- ══════════ GROUND CONTROL ══════════ -->
  <text x="32" y="32" fill="#333" font-size="13" font-weight="600">Ground control</text>

  <rect x="32" y="50" width="220" height="60" rx="8" fill="#F3EEFE" stroke="#8B72BE" stroke-width="1"/>
  <text x="142" y="74" text-anchor="middle" fill="#4E3D80" font-size="13" font-weight="600">Mission Planner (ArduPilot)</text>
  <text x="142" y="94" text-anchor="middle" fill="#7A6BA0" font-size="10">Waypoint upload · telemetry view</text>

  <rect x="300" y="50" width="220" height="60" rx="8" fill="#F3EEFE" stroke="#8B72BE" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="410" y="74" text-anchor="middle" fill="#4E3D80" font-size="13" font-weight="600">TBS Tango 2 Pro</text>
  <text x="410" y="94" text-anchor="middle" fill="#7A6BA0" font-size="10">Crossfire 915 MHz · 4 km range</text>

  <rect x="568" y="50" width="220" height="60" rx="8" fill="#F3EEFE" stroke="#8B72BE" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="678" y="74" text-anchor="middle" fill="#4E3D80" font-size="13" font-weight="600">Holybro SiK Telemetry</text>
  <text x="678" y="94" text-anchor="middle" fill="#7A6BA0" font-size="10">MAVLink 433 MHz · 500 mW</text>

  <!-- 3 funnel arrows into Pixhawk top -->
  <path d="M142,110 L142,180 L320,180 L320,216" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>
  <rect x="200" y="170" width="80" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="240" y="184" text-anchor="middle" fill="#666" font-size="10">mission plan</text>

  <line x1="410" y1="110" x2="410" y2="216" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>
  <rect x="378" y="150" width="64" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="410" y="164" text-anchor="middle" fill="#666" font-size="10">RC PPM</text>

  <path d="M678,110 L678,180 L500,180 L500,216" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>
  <rect x="540" y="170" width="80" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="580" y="184" text-anchor="middle" fill="#666" font-size="10">MAVLink</text>

  <!-- ══════════ FLIGHT CONTROLLER LAYER ══════════ -->
  <text x="32" y="208" fill="#333" font-size="13" font-weight="600">Avionics</text>

  <!-- Here3 GPS -->
  <rect x="24" y="220" width="200" height="84" rx="8" fill="#EBF5FF" stroke="#4A90D9" stroke-width="1"/>
  <text x="124" y="248" text-anchor="middle" fill="#1A5694" font-size="13" font-weight="600">Here3 GPS / INS</text>
  <text x="124" y="266" text-anchor="middle" fill="#4A78A5" font-size="10">RTK · gyro · accel</text>
  <text x="124" y="282" text-anchor="middle" fill="#4A78A5" font-size="10">mag · baro · CAN</text>

  <!-- Pixhawk -->
  <rect x="264" y="220" width="292" height="84" rx="8" fill="#FFF0E8" stroke="#D85A30" stroke-width="1"/>
  <text x="410" y="248" text-anchor="middle" fill="#712B13" font-size="13" font-weight="600">Pixhawk Cube Orange</text>
  <text x="410" y="266" text-anchor="middle" fill="#A86040" font-size="10">3× redundant IMUs · EKF</text>
  <text x="410" y="282" text-anchor="middle" fill="#A86040" font-size="10">temperature stabilised · ArduPilot</text>

  <!-- PDB + Battery -->
  <rect x="596" y="220" width="200" height="84" rx="8" fill="#E6F7F0" stroke="#1D9E75" stroke-width="1"/>
  <text x="696" y="248" text-anchor="middle" fill="#085041" font-size="13" font-weight="600">Power Distribution</text>
  <text x="696" y="266" text-anchor="middle" fill="#3A8A6E" font-size="10">2× 1300 mAh 6S LiPo</text>
  <text x="696" y="282" text-anchor="middle" fill="#3A8A6E" font-size="10">25.2 V · 2600 mAh · 100C</text>

  <!-- Here3 → Pixhawk -->
  <line x1="224" y1="262" x2="260" y2="262" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="226" y="244" width="32" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="242" y="258" text-anchor="middle" fill="#666" font-size="10">pos</text>

  <!-- PDB → Pixhawk (5V, power link in green) -->
  <line x1="596" y1="262" x2="560" y2="262" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr-pwr)"/>
  <rect x="562" y="244" width="32" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="578" y="258" text-anchor="middle" fill="#1D9E75" font-size="10">5 V</text>

  <!-- ══════════ ACTUATOR LAYER ══════════ -->
  <text x="32" y="406" fill="#333" font-size="13" font-weight="600">Propulsion &amp; payload</text>

  <rect x="32" y="418" width="200" height="80" rx="8" fill="#F5F5F2" stroke="#888" stroke-width="1"/>
  <text x="132" y="444" text-anchor="middle" fill="#333" font-size="13" font-weight="600">2× 4-in-1 ESC</text>
  <text x="132" y="462" text-anchor="middle" fill="#777" font-size="10">50 A · 3S–6S · DShot</text>
  <text x="132" y="478" text-anchor="middle" fill="#777" font-size="10">1000 µF spike filter</text>

  <rect x="272" y="418" width="200" height="80" rx="8" fill="#F5F5F2" stroke="#888" stroke-width="1"/>
  <text x="372" y="444" text-anchor="middle" fill="#333" font-size="13" font-weight="600">6× Emax ECO II 2306</text>
  <text x="372" y="462" text-anchor="middle" fill="#777" font-size="10">1700 KV BLDC</text>
  <text x="372" y="478" text-anchor="middle" fill="#777" font-size="10">5″ tri-blade props</text>

  <rect x="588" y="418" width="200" height="80" rx="8" fill="#F5F5F2" stroke="#888" stroke-width="1"/>
  <text x="688" y="444" text-anchor="middle" fill="#333" font-size="13" font-weight="600">Payload bay servo</text>
  <text x="688" y="462" text-anchor="middle" fill="#777" font-size="10">Double-door · single rod</text>
  <text x="688" y="478" text-anchor="middle" fill="#777" font-size="10">900 g capacity</text>

  <!-- Pixhawk → ESC (PWM) — vertical down then left -->
  <path d="M320,304 L320,376 L132,376 L132,414" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="206" y="366" width="68" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="240" y="380" text-anchor="middle" fill="#666" font-size="10">PWM/DShot</text>

  <!-- Pixhawk → Servo (AUX) — vertical down then right -->
  <path d="M500,304 L500,376 L688,376 L688,414" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="552" y="366" width="68" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="586" y="380" text-anchor="middle" fill="#666" font-size="10">AUX out</text>

  <!-- PDB → ESC power (green, routed below the PWM bus) -->
  <path d="M696,304 L696,394 L108,394 L108,414" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr-pwr)"/>
  <rect x="382" y="384" width="76" height="20" rx="10" fill="#fff" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="420" y="398" text-anchor="middle" fill="#1D9E75" font-size="10">25.2 V bus</text>

  <!-- ESC → Motors -->
  <line x1="232" y1="458" x2="268" y2="458" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="234" y="440" width="32" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="250" y="454" text-anchor="middle" fill="#666" font-size="10">3φ</text>

  <!-- ══════════ LEGEND ══════════ -->
  <g transform="translate(32,540)">
    <line x1="0" y1="8" x2="30" y2="8" stroke="#333" stroke-width="1"/>
    <text x="38" y="12" fill="#666" font-size="10">Wired signal</text>
    <line x1="120" y1="8" x2="150" y2="8" stroke="#888" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="158" y="12" fill="#666" font-size="10">Wireless link</text>
    <line x1="240" y1="8" x2="270" y2="8" stroke="#1D9E75" stroke-width="1.2"/>
    <text x="278" y="12" fill="#1D9E75" font-size="10">Power rail</text>

    <rect x="360" y="1" width="14" height="14" rx="3" fill="#F3EEFE" stroke="#8B72BE" stroke-width="0.8"/>
    <text x="382" y="12" fill="#666" font-size="10">Ground / comms</text>
    <rect x="478" y="1" width="14" height="14" rx="3" fill="#FFF0E8" stroke="#D85A30" stroke-width="0.8"/>
    <text x="500" y="12" fill="#666" font-size="10">Flight control</text>
    <rect x="588" y="1" width="14" height="14" rx="3" fill="#EBF5FF" stroke="#4A90D9" stroke-width="0.8"/>
    <text x="610" y="12" fill="#666" font-size="10">Navigation</text>
    <rect x="688" y="1" width="14" height="14" rx="3" fill="#F5F5F2" stroke="#888" stroke-width="0.8"/>
    <text x="710" y="12" fill="#666" font-size="10">Actuators</text>
  </g>

  <text x="410" y="590" text-anchor="middle" fill="#333" font-size="12" font-weight="600">Fig. 1 — System architecture of the ZEUS hexacopter</text>
</svg>
